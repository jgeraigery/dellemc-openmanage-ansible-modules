---
- name: Waiting for iDRAC to be in ready state
  vars:
    url1: "https://{{ idrac_ip | ansible.utils.ipwrap }}"
    url2: "/redfish/v1/Managers/iDRAC.Embedded.1"
    url3: "/Oem/Dell/DellLCService/Actions"
    url4: "/DellLCService.GetRemoteServicesAPIStatus"
  ansible.builtin.uri:
    url_username: "{{ idrac_user }}"
    url_password: "{{ idrac_password }}"
    timeout: 30
    validate_certs: false
    return_content: true
    force_basic_auth: true
    body_format: "json"
    headers:
      Content-Type: "application/json"
      Accept: "application/json"
      OData-Version: "4.0"
    url:
      "{{ url1 }}{{ url2 }}{{ url3 }}{{ url4 }}"
    method: POST
    body: {}
  until:
    - '"Status" in status_result.json'
    - status_result.json.Status == "Ready"
  register: status_result
  check_mode: false
  retries: 120
  delay: 30
