---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- block:
    - ansible.builtin.include_tasks: _helper.yml

    - block:
        - name: Export Lifecycle Controller Logs with job wait true
           (Local Path)
          dellemc.openmanage.idrac_lifecycle_controller_logs:
            share_name: "{{ role_path }}/files"
          register: result_local

        - name: Check that the exported file exists in LOCAL path.
          ansible.builtin.stat:
            path: "{{ result_local.lc_logs_status.file }}"
          register: local_stat

        - name: Verify the status of tasks
          ansible.builtin.assert:
            that:
              - not result_local.changed
              - local_stat.stat.exists
              - result_local.msg == "Successfully exported the lifecycle
                 controller logs."
              - result_local.lc_logs_status.Status == "Success"
              - result_local.lc_logs_status.JobStatus == "Completed"
      when: generation | int >= 14

    - name: Export Lifecycle Controller Logs with job wait true (NFS Share)
      dellemc.openmanage.idrac_lifecycle_controller_logs:
        share_name: "{{ nfs_share_name }}"
      register: result_nfs

    - name: Check that the exported file exists for NFS share
      ansible.builtin.stat:
        path: |-
          {{ nfs_share_mnt
            ~ '/' ~ (result_nfs.lc_logs_status.file | basename) }}
      register: nfs_stat

    - name: Export Lifecycle Controller Logs with job wait true (CIFS Share)
      dellemc.openmanage.idrac_lifecycle_controller_logs:
        share_name: "{{ cifs_share_name }}"
        share_user: "{{ cifs_share_user }}"
        share_password: "{{cifs_share_password}}"
      register: result_cifs

    - name: Check that the exported file exists for CIFS share
      ansible.builtin.stat:
        path: |-
          {{ cifs_share_mnt
            ~ '/' ~ (result_cifs.lc_logs_status.file | win_basename) }}
      register: cifs_stat

    - name: Verify the status of tasks
      ansible.builtin.assert:
        that:
          - not result_nfs.changed
          - not result_cifs.changed
          - nfs_stat.stat.exists
          - cifs_stat.stat.exists
          - result_cifs.msg == result_nfs.msg == "Successfully exported
             the lifecycle controller logs."
          - result_nfs.lc_logs_status.Status ==
             result_cifs.lc_logs_status.Status == "Success"
          - result_nfs.lc_logs_status.JobStatus ==
             result_cifs.lc_logs_status.JobStatus == "Completed"

  module_defaults:
    dellemc.openmanage.idrac_lifecycle_controller_logs:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
    dellemc.openmanage.idrac_system_info:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
