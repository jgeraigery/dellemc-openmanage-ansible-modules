---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- block:
    - ansible.builtin.include_tasks: _helper.yml

    - block:
        - name: Export Lifecycle Controller Logs with job wait false
           (Local Path)
          dellemc.openmanage.idrac_lifecycle_controller_logs:
            share_name: "{{ role_path }}/files"
            job_wait: false
          register: result_local

        - name: Check that the exported file exists local path.
          stat:
            path: "{{ result_local.lc_logs_status.file }}"

        - name: Verify the status of tasks
          ansible.builtin.assert:
            that:
              - not result_local.changed
              - result_local.msg == "Successfully exported
                the lifecycle controller logs."
      when: generation | int >= 14

    - name: Export Lifecycle Controller Logs with job wait false (CIFS Share)
      dellemc.openmanage.idrac_lifecycle_controller_logs:
        share_name: "{{ cifs_share_name }}"
        share_user: "{{ cifs_share_user }}"
        share_password: "{{ cifs_share_password }}"
        job_wait: false
      register: result_cifs

    - ansible.builtin.include_role: name=prepare_lifecycle_controller_job
      vars:
        job_id: "{{ result_cifs.lc_logs_status.Job.JobId }}"

    - name: Check that the exported file exists for CIFS share
      ansible.builtin.stat:
        path: |-
          {{ cifs_share_mnt
            ~ '/' ~ (result_cifs.lc_logs_status.file | win_basename) }}

    - name: Export Lifecycle Controller Logs with job wait false (NFS Share)
      dellemc.openmanage.idrac_lifecycle_controller_logs:
        share_name: "{{ nfs_share_name }}"
        job_wait: false
      register: result_nfs

    - ansible.builtin.include_role: name=prepare_lifecycle_controller_job
      vars:
        job_id: "{{ result_nfs.lc_logs_status.Job.JobId }}"

    - name: Check that the exported file exists for NFS share
      ansible.builtin.stat:
        path: |-
          {{ nfs_share_mnt
            ~ '/' ~ (result_nfs.lc_logs_status.file | basename) }}

    - name: Verify the status of tasks
      ansible.builtin.assert:
        that:
          - not result_local.changed
          - not result_nfs.changed
          - not result_cifs.changed
          - result_nfs.lc_logs_status.Return == "JobCreated"
          - result_cifs.lc_logs_status.Return == "JobCreated"
          - result_nfs.msg == result_cifs.msg == "The export lifecycle
            controller log job is submitted successfully."

  module_defaults:
    dellemc.openmanage.idrac_lifecycle_controller_logs:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
