---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- block:

    - ansible.builtin.include_tasks: get_data_uri.yml
      vars:
        url: https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Managers/\
          iDRAC.Embedded.1

    - ansible.builtin.set_fact:
        firmware_version_from_api_response: '{{ uri_data.FirmwareVersion }}'
        firmware_version_expected: "6.00.02.00"

    - name: Prerequisite - Validate firmware version
      ansible.builtin.assert:
        that:
          - "firmware_version_from_api_response >= firmware_version_expected"
        fail_msg: "Firmware version is not supported"

    - name: Prerequisite - Eject virtual media from RFS2
      dellemc.openmanage.idrac_virtual_media:
        virtual_media:
          - index: 2
            insert: false

    - ansible.builtin.include_tasks: get_data_uri.yml
      vars:
        url: https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Systems/\
          System.Embedded.1/VirtualMedia/2

    - name: Verify task status - Prerequisite - Eject virtual media from RFS2
      ansible.builtin.assert:
        that:
          - not uri_data.Inserted
          - not uri_data.Image

    - name: Insertion of virtual media with media_type as USBStick from NFS
        share to RFS2 (Check mode)
      dellemc.openmanage.idrac_virtual_media: &idrac_virtual_media
        virtual_media:
          - index: 2
            insert: true
            media_type: USBStick
            image: "{{ nfs_share_img_file_path }}"
      register: result
      check_mode: true

    - name: Verify task status - Insertion of virtual media with media_type as
        USBStick from NFS share to RFS2 (Check mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Changes found to be applied."

    - name: Insertion of virtual media with media_type as USBStick from NFS
        share to RFS2 (Normal mode)
      dellemc.openmanage.idrac_virtual_media:
        <<: *idrac_virtual_media
      register: result

    - ansible.builtin.include_tasks: get_data_uri.yml
      vars:
        url: https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Systems/\
          System.Embedded.1/VirtualMedia/2

    - name: Verify task status - Insertion of virtual media with media_type as
        USBStick from NFS share to RFS2 (Normal mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Successfully performed the virtual media operation."
          - uri_data.Inserted
          - uri_data.Image == nfs_share_img_file_path

    - name: Insertion of virtual media with media_type as USBStick from NFS
        share to RFS2 (Check mode)
      dellemc.openmanage.idrac_virtual_media:
        <<: *idrac_virtual_media
      register: result
      check_mode: true

    - name: Verify task status - Insertion of virtual media with media_type as
        USBStick from NFS share to RFS2 (Check mode)
      ansible.builtin.assert:
        that:
          - not result.changed
          - result.msg == "No changes found to be applied."

    - name: Insertion of virtual media with media_type as USBStick from NFS
        share to RFS2 (Idempotency mode)
      dellemc.openmanage.idrac_virtual_media:
        <<: *idrac_virtual_media
      register: result

    - name: Verify task status - Insertion of virtual media with media_type as
        USBStick from NFS share to RFS2 (Idempotency mode)
      ansible.builtin.assert:
        that:
          - not result.changed
          - result.msg == "No changes found to be applied."

  module_defaults:
    dellemc.openmanage.idrac_virtual_media:
      idrac_ip: "{{idrac_ip}}"
      idrac_user: "{{idrac_user}}"
      idrac_password: "{{idrac_password}}"
      validate_certs: "{{validate_certs}}"
