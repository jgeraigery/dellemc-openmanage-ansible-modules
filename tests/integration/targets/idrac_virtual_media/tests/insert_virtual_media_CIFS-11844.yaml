---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- block:
    - ansible.builtin.include_tasks: get_data_uri.yml
      vars:
        url: https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Managers/\
          iDRAC.Embedded.1

    - ansible.builtin.set_fact:
        firmware_version_from_api_response: '{{ uri_data.FirmwareVersion }}'
        firmware_version_expected: "6.00.02.00"

    - name: Prerequisite - Validate firmware version
      ansible.builtin.assert:
        that:
          - "firmware_version_from_api_response >= firmware_version_expected"
        fail_msg: "Firmware version is not supported"

    - name: Prerequisite - Eject virtual media from RFS1
      dellemc.openmanage.idrac_virtual_media: &idrac_virtual_media_1
        virtual_media:
          - index: 1
            insert: false

    - ansible.builtin.include_tasks: get_data_uri.yml
      vars:
        url: https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Systems/\
          System.Embedded.1/VirtualMedia/1

    - name: Verify task status - Prerequisite - Eject virtual media from RFS1
      ansible.builtin.assert:
        that:
          - not uri_data.Inserted
          - not uri_data.Image

    - name: Insertion of virtual media to RFS1 from CIFS share by providing
        media_type and index (Check mode)
      dellemc.openmanage.idrac_virtual_media: &idrac_virtual_media_2
        virtual_media:
          - index: 1
            insert: true
            media_type: CD
            image: "{{ cifs_share_iso_file_path }}"
            username: "{{ cifs_share_user }}"
            password: "{{ cifs_share_password }}"
      register: result
      check_mode: true

    - name: Verify task status - Insertion of virtual media to RFS1 from CIFS
        share by providing media_type and index (Check mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Changes found to be applied."

    - name: Insertion of virtual media to RFS1 from CIFS share (Normal mode)
      dellemc.openmanage.idrac_virtual_media:
        <<: *idrac_virtual_media_2
      register: result

    - ansible.builtin.include_tasks: get_data_uri.yml
      vars:
        url: https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Systems/\
          System.Embedded.1/VirtualMedia/1

    - name: Verify task status - Insertion of virtual media to RFS1 from CIFS
        share by providing media_type and index (Normal mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Successfully performed the virtual media operation."
          - uri_data.Inserted
          - uri_data.Image == cifs_share_iso_file_path

    - name: Insertion of virtual media to RFS1 from CIFS share by providing
        media_type and index (Check mode)
      dellemc.openmanage.idrac_virtual_media:
        <<: *idrac_virtual_media_2
      register: result
      check_mode: true

    - name: Verify task status - Insertion of virtual media to RFS1 from CIFS
        share by providing media_type and index (Check mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Changes found to be applied."

    - name: Prerequisite - Eject virtual media from RFS1
      dellemc.openmanage.idrac_virtual_media:
        <<: *idrac_virtual_media_1
      register: result

    - ansible.builtin.include_tasks: get_data_uri.yml
      vars:
        url: https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Systems/\
          System.Embedded.1/VirtualMedia/1

    - name: Verify task status - Prerequisite - Eject virtual media from RFS1
      ansible.builtin.assert:
        that:
          - not uri_data.Inserted
          - not uri_data.Image
          -
    - name: Insertion of virtual media to RFS1 from CIFS share without
        providing media_type and index (Check mode)
      dellemc.openmanage.idrac_virtual_media: &idrac_virtual_media_3
        virtual_media:
          - insert: true
            image: "{{ cifs_share_iso_file_path }}"
            username: "{{ cifs_share_user }}"
            password: "{{ cifs_share_password }}"
      register: result
      check_mode: true

    - name: Verify task status - Insertion of virtual media to RFS1 from CIFS
        share without providing media_type and index (Check mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Changes found to be applied."

    - name: Insertion of virtual media to RFS1 from CIFS share without
        providing media_type and index (Normal mode)
      dellemc.openmanage.idrac_virtual_media:
        <<: *idrac_virtual_media_3
      register: result

    - ansible.builtin.include_tasks: get_data_uri.yml
      vars:
        url: https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Systems/\
          System.Embedded.1/VirtualMedia/1

    - name: Verify task status - Insertion of virtual media to RFS1 from CIFS
        share without providing media_type and index (Normal mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Successfully performed the virtual media operation."
          - uri_data.Inserted
          - uri_data.Image == cifs_share_iso_file_path

    - name: Insertion of virtual media to RFS1 from CIFS share without
        providing media_type and index (Check mode)
      dellemc.openmanage.idrac_virtual_media:
        <<: *idrac_virtual_media_3
      register: result
      check_mode: true

    - name: Verify task status - Insertion of virtual media to RFS1 from CIFS
        share without providing media_type and index (Check mode)
      ansible.builtin.assert:
        that:
          - result.changed
          - result.msg == "Changes found to be applied."

  module_defaults:
    dellemc.openmanage.idrac_virtual_media:
      idrac_ip: "{{idrac_ip}}"
      idrac_user: "{{idrac_user}}"
      idrac_password: "{{idrac_password}}"
      validate_certs: "{{validate_certs}}"
