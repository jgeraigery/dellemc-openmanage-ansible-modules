---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
    is not defined'

- block:
    - name: Negative - unreachable host
      idrac_system_info:
        idrac_ip: "999.999.999.999"
      register: invalid_unreachable
      ignore_unreachable: true

    - name: Verify status of tasks
      assert:
        that:
          - invalid_unreachable.unreachable
          - 'invalid_unreachable.msg == "Unable to communicate with
           iDRAC 999.999.999.999. This may be due to one of the following:
           Incorrect username or password, unreachable iDRAC IP or a failure
           in TLS/SSL handshake." or invalid_unreachable.msg ==
           "<urlopen error [Errno -2] Name or service not known>"'

  module_defaults:
    dellemc.openmanage.idrac_system_info:
      idrac_ip: "{{idrac_ip}}"
      idrac_user: "{{idrac_user}}"
      idrac_password: "{{idrac_password}}"
      validate_certs: "{{validate_certs}}"
