- name: Fetch storage members health details
  ansible.builtin.uri:
    url: 'https://{{ idrac_ip | ansible.utils.ipwrap }}:{{ idrac_port }}
      {{ storage_health_data.json.get("Members", [])[0].get("@odata.id", "")}}'
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    body_format: json
