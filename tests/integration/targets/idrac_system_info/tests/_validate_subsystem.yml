---
- name: Fetch cpu health details
  ansible.builtin.uri:
    url: "{{ cpu_uri }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    body_format: json
    return_content: true
    status_code: 200
  register: cpu_health_data

