---
- name: Fetch fan details
  ansible.builtin.uri:
    url: "{{ fan_uri }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    body_format: json
    return_content: true
    status_code: 200
  register: uri_data

- name: Structuring fan details
  ansible.builtin.command:
    cmd: >
      python _get_fan_details.py
      '{{ uri_data.json | to_json }}'
    chdir: "{{ playbook_dir }}/targets/idrac_system_info/tests"
  register: fan_updated_dict
  no_log: true
  when:
    - uri_data.status == 200

- name: Output conversion to list
  ansible.builtin.set_fact:
    fan_updated_dict: "{{ fan_updated_dict.stdout | to_json |
      from_json }}"
  when:
    - uri_data.status == 200

- name: Comparing values inside list for fan
  ansible.builtin.include_tasks:
    file: _compare_diff.yml
  vars:
    _before: "{{ item.0 | dict2items
        | rejectattr('key', 'in', ['PWM', 'CurrentReading'])
        | items2dict}}"
    _after: "{{ item.1 | dict2items
        | rejectattr('key', 'in', ['PWM', 'CurrentReading'])
        | items2dict}}"
  when: uri_data.status == 200
  loop: >-
    {{
    result.system_info.Fan
    | sort(attribute='DeviceDescription')
    | zip(fan_updated_dict | sort(attribute='DeviceDescription'))
    | list
    }}
