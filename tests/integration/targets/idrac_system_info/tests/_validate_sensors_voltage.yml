---
- name: Fetch sensors voltage details
  ansible.builtin.uri:
    url: "{{ sensors_voltage_uri }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    force_basic_auth: true
    validate_certs: false
    body_format: json
    return_content: true
    status_code: 200
  register: uri_data

- name: Structuring sensors voltage details
  ansible.builtin.command:
    cmd: >
      python _get_sensors_voltage_details.py
      '{{ uri_data.json | to_json }}'
    chdir: "{{ playbook_dir }}/targets/idrac_system_info/tests"
  register: sensors_voltage_updated_dict
  when:
    - uri_data.status == 200

- name: Output conversion to list
  ansible.builtin.set_fact:
    sensors_voltage_updated_dict: "{{ sensors_voltage_updated_dict.stdout |
      to_json | from_json }}"
  when:
    - uri_data.status == 200

- name: Sorting the data before compare
  ansible.builtin.set_fact:
    SensorsVoltage: "{{ result.system_info.Sensors_Voltage |
      sort(attribute='Key') }}"
    APISensorsVoltage: "{{ sensors_voltage_updated_dict |
      sort(attribute='Key') }}"

- name: Asserting number of dictonary matches in list
  ansible.builtin.assert:
    that: "{{ SensorsVoltage | length == APISensorsVoltage | length }}"

- name: Comparing values inside list for sensors voltage
  ansible.builtin.include_tasks:
    file: _compare_diff.yml
  vars:
    _before: "{{ item.0 }}"
    _after: "{{ item.1 }}"
  when: uri_data.status == 200
  loop: "{{ SensorsVoltage | zip(APISensorsVoltage) }}"
