---
- name: Structure System details using validation script
  ansible.builtin.command:
    cmd: >
      python _get_system_details.py
      '{{ idrac_ip }}'
      '{{ idrac_user }}'
      '{{ idrac_password }}'
      '{{ idrac_port }}'
    chdir: "{{ playbook_dir }}/targets/idrac_system_info/tests"
  register: system_updated_dict

- name: Output conversion to list
  ansible.builtin.set_fact:
    system_updated_dict: "{{ system_updated_dict.stdout | to_json | from_json}}"
  when:
    - uri_data.status == 200

- name: Comparing values inside list for system
  ansible.builtin.include_tasks:
    file: _compare_diff.yml
  vars:
    _before: "{{ item.0 }}"
    _after: "{{ item.1 }}"
  when: uri_data.status == 200
  loop: "{{ result.system_info.System | zip(system_updated_dict) }}"
