---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- name: Get Server generation details
  ansible.builtin.include_tasks: _get_server_generation.yml

- block:
    - name: Pre-requisite - "boot_source_override_target" as "hdd"
      dellemc.openmanage.idrac_boot:
        boot_source_override_target: hdd
        reset_type: none

    - name: Configuring "boot_source_override_target" as "pxe" -
       Check mode - Changes expected
      dellemc.openmanage.idrac_boot:
        boot_source_override_target: pxe
        reset_type: none
      register: pxe_cm_mode
      check_mode: true

    - name: Verify configuring "boot_source_override_target" as "pxe" -
       check mode
      ansible.builtin.assert:
        that:
          - pxe_cm_mode.changed
          - pxe_cm_mode.msg == 'Changes found to be applied.'

    - name: Configuring "boot_source_override_target" as "pxe" - Normal -
       Changes expected
      dellemc.openmanage.idrac_boot:
        boot_source_override_target: pxe
        reset_type: none
      register: pxe_normal_mode

    - include_tasks: get_data_uri.yml
      vars:
        url: "https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Systems\
         /System.Embedded.1/"

    - name: extracting data from get_data_uri
      set_fact:
        pxe_normal: "{{ boot_data | json_query('Boot') }}"
      vars:
        boot_data: "{{ result_get_data.content | from_json }}"

    - name: Verify configuring "boot_source_override_target" as "pxe" -
       normal mode
      ansible.builtin.assert:
        that:
          - pxe_normal.BootSourceOverrideTarget == 'Pxe'
          - not pxe_normal_mode.changed
          - pxe_normal_mode.msg == 'The boot settings operation is
             triggered/submitted successfully.'

    - name: Configuring "boot_source_override_target" as "pxe" - Idempotency
      dellemc.openmanage.idrac_boot:
        boot_source_override_target: pxe
        reset_type: none
      register: pxe_idempotency_mode
      when: generation | int < 17

    - name: Verify configuring "boot_source_override_target" as "pxe" -
       Idempotency
      ansible.builtin.assert:
        that:
          - not pxe_idempotency_mode.changed
          - pxe_idempotency_mode.msg == 'No changes found to be applied.'
      when: generation | int < 17

    - name: Configuring "boot_source_override_target" as "floppy" - Check mode
       - Changes expected
      dellemc.openmanage.idrac_boot:
        boot_source_override_target: floppy
        reset_type: none
