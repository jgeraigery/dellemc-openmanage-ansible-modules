    - include_tasks: get_data_uri.yml
      vars:
        url: "https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Systems\
         /System.Embedded.1/BootOptions?$expand=*($levels=1)"

    - name: extracting UefiDevicePath
      set_fact:
        uefi_device_path:
          "{{ boot_data | json_query('Members[0].UefiDevicePath') }}"
      vars:
        boot_data: "{{ result_get_data.content | from_json }}"

    - name: Configuring "boot_source_override_target" as "uefi_target" -
       Check mode - Changes expected
      dellemc.openmanage.idrac_boot:
        boot_source_override_target: uefi_target
        uefi_target_boot_source_override: "{{ uefi_device_path }}"
        reset_type: none
      register: uefi_target_cm_mode
      check_mode: true

    - name: Verify configuring "boot_source_override_target" as "uefi_target" -
       check mode
      ansible.builtin.assert:
        that:
          - uefi_target_cm_mode.changed
          - uefi_target_cm_mode.msg == 'Changes found to be applied.'

    - name: Configuring "boot_source_override_target" as "uefi_target" - Normal
       - Changes expected
      dellemc.openmanage.idrac_boot:
        boot_source_override_target: uefi_target
        uefi_target_boot_source_override: "{{ uefi_device_path }}"
        reset_type: none
        timeout: 120
      register: uefi_target_normal_mode

    - include_tasks: get_data_uri.yml
      vars:
        url: "https://{{idrac_ip}}:{{idrac_port}}/redfish/v1/Systems\
          /System.Embedded.1/"

    - name: extracting data from get_data_uri
