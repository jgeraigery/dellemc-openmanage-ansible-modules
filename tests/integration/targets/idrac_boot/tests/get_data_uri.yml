---
- name: Pre-req - Get data using uri
  uri:
    url: "{{ url }}"
    user: "{{ idrac_user }}"
    password: "{{ idrac_password }}"
    method: GET
    body: {}
    validate_certs: false
    body_format: json
    return_content: true
    status_code: 200
    headers: 'Accept=application/json'
  register: result_get_data

- name: extracting data from get_data_uri
  set_fact:
    boot_options_fetched_data:
      "{{ result_get_data.content | from_json | json_query('Members') }}"

- name: verify status of the tasks (using uri)
  assert:
    that:
      - result_get_data.status == 200
