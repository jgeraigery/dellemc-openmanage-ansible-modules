---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- name: Get Server generation details
  ansible.builtin.include_tasks: _get_server_generation.yml

- block:
    - name: Pre-req - Delete user
      dellemc.openmanage.idrac_user:
        state: "absent"
        user_name: "{{ item }}"
      loop:
        - "omam_test_user"
        - "omam_test"

    - name: Set authentication and privacy protocols based on iDRAC generation
      ansible.builtin.set_fact:
        auth_protocol: "{{ 'SHA-384' if generation | int >= 17 else 'SHA' }}"
        priv_protocol: "{{ 'AES-256' if generation | int >= 17 else 'AES' }}"

    - name: Create a new iDRAC user.
      dellemc.openmanage.idrac_user:
        user_name: "omam_test_user"
        user_password: "#DKMS_1234%"
        custom_privilege: 511
        ipmi_lan_privilege: No Access
        ipmi_serial_privilege: Operator
        enable: true
        sol_enable: false
        protocol_enable: true
        authentication_protocol: "{{ auth_protocol }}"
        privacy_protocol: "{{ priv_protocol }}"

    - name: Retrieve user details using user_name
      dellemc.openmanage.idrac_user_info:
        username: "omam_test_user"
      register: verify_new

    - name: Asserting the changes done
      assert:
        that:
          - "{{ (verify_new.user_info | length) != 0 }}"
          - verify_new.user_info[0].UserName == "omam_test_user"
          - verify_new.user_info[0].RoleId == "Administrator"

    - name: Modify the iDRAC user using custom_privilege.
       (check mode - changes expected)
      dellemc.openmanage.idrac_user: &modify_cp
        user_name: "omam_test_user"
        new_user_name: "omam_modified"
        user_password: "#DKMS_1234%"
        custom_privilege: 2
        ipmi_lan_privilege: No Access
        ipmi_serial_privilege: Operator
        enable: true
        sol_enable: false
        protocol_enable: true
        authentication_protocol: "{{ auth_protocol }}"
        privacy_protocol: "{{ priv_protocol }}"
      check_mode: true
      register: cm_cp_changes

    - name: Modify the iDRAC user using custom_privilege. (Normal mode)
      dellemc.openmanage.idrac_user:
        <<: *modify_cp
      register: result_cp

    - name: Retrieve user details using user_name
      dellemc.openmanage.idrac_user_info:
        username: "omam_modified"
      register: verify_mod

    - name: Asserting the changes done
      assert:
        that:
          - "{{ (verify_mod.user_info | length) != 0 }}"
          - verify_mod.user_info[0].UserName == "omam_modified"
          - verify_mod.user_info[0].RoleId == "Operator"

    - name: Modify the iDRAC user using custom_privilege.
       (check mode - no changes expected)
      dellemc.openmanage.idrac_user: &modified_cp
        user_name: "omam_modified"
        custom_privilege: 2
        ipmi_lan_privilege: No Access
        ipmi_serial_privilege: Operator
        enable: true
        sol_enable: false
        protocol_enable: true
        authentication_protocol: "{{ auth_protocol }}"
        privacy_protocol: "{{ priv_protocol }}"
      register: cm_cp_no_changes

    - name: Modify the iDRAC user using custom_privilege (Idempotence mode)
      dellemc.openmanage.idrac_user:
        <<: *modified_cp
      register: idempotence_cp

    - name: Create a new iDRAC user using custom privilege and privilege.
      dellemc.openmanage.idrac_user:
        user_name: "omam_test"
        user_password: "#DKMS_1234%"
        privilege: "None"
        custom_privilege: 55
        ipmi_lan_privilege: No Access
        ipmi_serial_privilege: Operator
        enable: true
        sol_enable: false
        protocol_enable: true
        authentication_protocol: "{{ auth_protocol }}"
        privacy_protocol: "{{ priv_protocol }}"
      when: generation | int < 17

    - name: Retrieve user details using user_name
      dellemc.openmanage.idrac_user_info:
        username: "omam_test"
      register: verify_cp_pv
      when: generation | int < 17

    - name: Asserting the changes done
      assert:
        that:
          - "{{ (verify_cp_pv.user_info | length) != 0 }}"
          - verify_cp_pv.user_info[0].UserName == "omam_test"
          - verify_cp_pv.user_info[0].RoleId == "Operator"
      when: generation | int < 17

    - name: Create a new iDRAC user using custom privilege and privilege.
      dellemc.openmanage.idrac_user:
        user_name: "omam_test"
        user_password: "#DKMS_1234%"
        privilege: 'Operator'
        custom_privilege: 55
        ipmi_lan_privilege: No Access
        ipmi_serial_privilege: Operator
        enable: true
        sol_enable: false
        protocol_enable: true
        authentication_protocol: "{{ auth_protocol }}"
        privacy_protocol: "{{ priv_protocol }}"
      when: generation | int >= 17

    - name: Modify the iDRAC user using custom_privilege and privilege.
       (check mode - changes expected)
      dellemc.openmanage.idrac_user: &modify_cpp
        user_name: "omam_test"
        new_user_name: "omam_test_m"
        user_password: "#DKMS_1234%"
        privilege: "ReadOnly"
        custom_privilege: 120
        ipmi_lan_privilege: No Access
        ipmi_serial_privilege: Operator
        enable: true
        sol_enable: false
        protocol_enable: true
        authentication_protocol: "{{ auth_protocol }}"
        privacy_protocol: "{{ priv_protocol }}"
      check_mode: true
      register: cm_cp_p

    - name: Modify the iDRAC user using custom_privilege and privilege.
       (Normal mode)
      dellemc.openmanage.idrac_user:
        <<: *modify_cpp
      register: result_cp_p

    - name: Retrieve user details using user_name
      dellemc.openmanage.idrac_user_info:
        username: "omam_test_m"
      register: verify_cp_p

    - name: Asserting the changes done
      assert:
        that:
          - "{{ (verify_cp_p.user_info | length) != 0 }}"
          - verify_cp_p.user_info[0].UserName == "omam_test_m"
          - verify_cp_p.user_info[0].RoleId == "Operator"

    - name: Modify the iDRAC user using custom_privilege and privilege.
       (check mode - no changes expected)
      dellemc.openmanage.idrac_user: &modified_cpp
        user_name: "omam_test_m"
        privilege: "ReadOnly"
        custom_privilege: 120
        ipmi_lan_privilege: No Access
        ipmi_serial_privilege: Operator
        enable: true
        sol_enable: false
        protocol_enable: true
        authentication_protocol: "{{ auth_protocol }}"
        privacy_protocol: "{{ priv_protocol }}"
      register: cm_no_changes_cp_p

    - name: Modify the iDRAC user using custom_privilege (Idempotence mode)
      dellemc.openmanage.idrac_user:
        <<: *modified_cpp
      register: idempotence_cp_p

    - name: verify status of tasks.
      assert:
        that:
          - cm_cp_changes.changed
          - cm_cp_changes.msg == "Changes found to commit!"
          - result_cp.changed
          - result_cp.msg == "Successfully updated user account."
          - not cm_cp_no_changes.changed
          - cm_cp_no_changes.msg == "Requested changes are already present
             in the user slot."
          - not idempotence_cp.changed
          - idempotence_cp.msg == "Requested changes are already present in
             the user slot."
          - cm_cp_p.changed
          - cm_cp_p.msg == "Changes found to commit!"
          - result_cp_p.changed
          - result_cp_p.msg == "Successfully updated user account."
          - not cm_no_changes_cp_p.changed
          - cm_no_changes_cp_p.msg == "Requested changes are already present
             in the user slot."
          - not idempotence_cp_p.changed
          - idempotence_cp_p.msg == "Requested changes are already present in
             the user slot."

  always:
    - name: Delete the modified user (clean up task)
      dellemc.openmanage.idrac_user:
        state: "absent"
        user_name: "{{ item }}"
      loop:
        - omam_modified
        - omam_test_m

  module_defaults:
    dellemc.openmanage.idrac_user:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"

    dellemc.openmanage.idrac_user_info:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
