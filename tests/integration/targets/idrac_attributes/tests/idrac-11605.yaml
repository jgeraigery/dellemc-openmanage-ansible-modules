---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- block:
    - name: Update iDRAC attributes
      dellemc.openmanage.idrac_attributes:
        idrac_attributes:
          SNMP.1.AgentCommunity: private
      register: result

    - name: Update iDRAC attributes - check mode - (Change expected)
      dellemc.openmanage.idrac_attributes:
        idrac_attributes:
          SNMP.1.AgentCommunity: public
      register: cm_result
      check_mode: true

    - name: Update iDRAC attributes - Normal
      dellemc.openmanage.idrac_attributes:
        idrac_attributes:
          SNMP.1.AgentCommunity: public
      register: idrac_result

    - ansible.builtin.include_tasks: _helper.yml
      vars:
        fqdd: ['iDRAC.Embedded.1']
        attrs: "{{idrac_single_attribute}}"

    - ansible.builtin.set_fact:
        idrac_single_attr_result: "{{scp_val_attr}}"

    - name: Update iDRAC attributes - check mode - (No change expected)
      dellemc.openmanage.idrac_attributes:
        idrac_attributes:
          SNMP.1.AgentCommunity: public
      register: no_cm_result
      check_mode: true

    - name: Update iDRAC attributes - Idempotency - (No change expected)
      dellemc.openmanage.idrac_attributes:
        idrac_attributes:
          SNMP.1.AgentCommunity: public
      register: idempotence_result

    - name: Update multiple iDRAC attributes
      dellemc.openmanage.idrac_attributes:
        idrac_attributes:
          SNMP.1.AgentCommunity: private
          SNMP.1.AgentEnable: Disabled
          SNMP.1.DiscoveryPort: 100
      register: idrac_results

    - name: Update multiple iDRAC attributes - check mode - (Change expected)
      dellemc.openmanage.idrac_attributes:
        idrac_attributes:
          SNMP.1.AgentCommunity: public
          SNMP.1.AgentEnable: Enabled
          SNMP.1.DiscoveryPort: 161
      register: idrac_cm_results
      check_mode: true

    - name: Update multiple iDRAC attributes - Normal
      dellemc.openmanage.idrac_attributes:
        idrac_attributes:
          SNMP.1.AgentCommunity: public
          SNMP.1.AgentEnable: Enabled
          SNMP.1.DiscoveryPort: 161
      register: multiple_idrac_results

    - include_tasks: _helper.yml
      vars:
        fqdd: ['iDRAC.Embedded.1']
        attrs: "{{idrac_multiple_attributes}}"

    - ansible.builtin.set_fact:
        idrac_multiple_attr_result: "{{scp_val_attr}}"

    - name: Update multiple iDRAC attributes - check mode
       (No change expected)
      dellemc.openmanage.idrac_attributes:
        idrac_attributes:
          SNMP.1.AgentCommunity: public
          SNMP.1.AgentEnable: Enabled
          SNMP.1.DiscoveryPort: 161
      register: no_cm_results
      check_mode: true

    - name: Update multiple iDRAC attributes - Idempotency
       (No change expected)
      dellemc.openmanage.idrac_attributes:
        idrac_attributes:
          SNMP.1.AgentCommunity: public
          SNMP.1.AgentEnable: Enabled
          SNMP.1.DiscoveryPort: 161
      register: idempotence_results

    - name: Verify status of tasks
      ansible.builtin.assert:
        that:
          - cm_result.changed
          - cm_result.msg == "Changes found to be applied."
          - idrac_result.msg == "Successfully updated the attributes."
          - idrac_single_attribute["SNMP.1.AgentCommunity"] in
             idrac_single_attr_result
          - not no_cm_result.changed
          - no_cm_result.msg == "No changes found to be applied."
          - not idempotence_result.changed
          - idempotence_result.msg == "No changes found to be applied."
          - idrac_cm_results.changed
          - idrac_cm_results.msg == "Changes found to be applied."
          - multiple_idrac_results.msg == "Successfully updated the attributes."
          - (idrac_multiple_attributes["SNMP.1.AgentCommunity"] | string)
             in idrac_multiple_attr_result
          - idrac_multiple_attributes["SNMP.1.AgentEnable"] in
             idrac_multiple_attr_result
          - (idrac_multiple_attributes["SNMP.1.DiscoveryPort"] | string)
             in idrac_multiple_attr_result
          - not no_cm_results.changed
          - no_cm_results.msg == "No changes found to be applied."
          - not idempotence_results.changed
          - idempotence_results.msg == "No changes found to be applied."

  module_defaults:
    dellemc.openmanage.idrac_attributes:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
