---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg: 'Please define the following variables: idrac_ip, idrac_user and
     idrac_password.'
  when: 'idrac_ip is not defined or idrac_user is not defined or idrac_password
   is not defined'

- block:
    - name: Update lc attributes
      dellemc.openmanage.idrac_attributes:
        lifecycle_controller_attributes:
          LCAttributes.1.AutoUpdate: Enabled
      register: result

    - name: Update lc attributes - check mode - (Change expected)
      dellemc.openmanage.idrac_attributes:
        lifecycle_controller_attributes:
          LCAttributes.1.AutoUpdate: Disabled
      register: cm_result
      check_mode: true

    - name: Update lc attributes - Normal
      dellemc.openmanage.idrac_attributes:
        lifecycle_controller_attributes:
          LCAttributes.1.AutoUpdate: Disabled
      register: lc_result

    - ansible.builtin.include_tasks: _helper.yml
      vars:
        fqdd: ['LifecycleController.Embedded.1']
        attrs: "{{lc_single_attribute}}"

    - set_fact:
        lc_single_attr_result: "{{scp_val_attr}}"

    - name: Update lc attributes - check mode - (No change expected)
      dellemc.openmanage.idrac_attributes:
        lifecycle_controller_attributes:
          LCAttributes.1.AutoUpdate: Disabled
      register: no_cm_result
      check_mode: true

    - name: Update lc attributes - Idempotency - (No change expected)
      dellemc.openmanage.idrac_attributes:
        lifecycle_controller_attributes:
          LCAttributes.1.AutoUpdate: Disabled
      register: idempotence_result

    - name: Update multiple lc attributes
      dellemc.openmanage.idrac_attributes:
        lifecycle_controller_attributes:
          LCAttributes.1.AutoUpdate: Enabled
          LCAttributes.1.CollectSystemInventoryOnRestart: Disabled
      register: lc_results

    - name: Update multiple lc attributes - check mode - (Change expected)
      dellemc.openmanage.idrac_attributes:
        lifecycle_controller_attributes:
          LCAttributes.1.AutoUpdate: Disabled
          LCAttributes.1.CollectSystemInventoryOnRestart: Enabled
      register: lc_cm_results
      check_mode: true

    - name: Update multiple lc attributes - Normal
      dellemc.openmanage.idrac_attributes:
        lifecycle_controller_attributes:
          LCAttributes.1.AutoUpdate: Disabled
          LCAttributes.1.CollectSystemInventoryOnRestart: Enabled
      register: multiple_lc_results

    - ansible.builtin.include_tasks: _helper.yml
      vars:
        fqdd: ['LifecycleController.Embedded.1']
        attrs: "{{lc_multiple_attributes}}"

    - ansible.builtin.set_fact:
        lc_multiple_attr_result: "{{scp_val_attr}}"

    - name: Update multiple lc attributes - check mode - (No change expected)
      dellemc.openmanage.idrac_attributes:
        lifecycle_controller_attributes:
          LCAttributes.1.AutoUpdate: Disabled
          LCAttributes.1.CollectSystemInventoryOnRestart: Enabled
      register: no_cm_results
      check_mode: true

    - name: Update multiple lc attributes - Idempotency - (No change expected)
      dellemc.openmanage.idrac_attributes:
        lifecycle_controller_attributes:
          LCAttributes.1.AutoUpdate: Disabled
          LCAttributes.1.CollectSystemInventoryOnRestart: Enabled
      register: idempotence_results

    - name: Verify status of tasks
      ansible.builtin.assert:
        that:
          - cm_result.changed
          - cm_result.msg == "Changes found to be applied."
          - lc_result.msg == "Successfully updated the attributes."
          - lc_single_attribute["LCAttributes.1.AutoUpdate"] in
             lc_single_attr_result
          - not no_cm_result.changed
          - no_cm_result.msg == "No changes found to be applied."
          - not idempotence_result.changed
          - idempotence_result.msg == "No changes found to be applied."
          - lc_cm_results.changed
          - lc_cm_results.msg == "Changes found to be applied."
          - multiple_lc_results.msg == "Successfully updated the attributes."
          - lc_multiple_attributes["LCAttributes.1.AutoUpdate"] in
             lc_multiple_attr_result
          - lc_multiple_attributes
              ["LCAttributes.1.CollectSystemInventoryOnRestart"]
              in lc_multiple_attr_result
          - not no_cm_result.changed
          - not no_cm_results.changed
          - no_cm_results.msg == "No changes found to be applied."
          - not idempotence_results.changed
          - idempotence_results.msg == "No changes found to be applied."

  module_defaults:
    dellemc.openmanage.idrac_attributes:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
