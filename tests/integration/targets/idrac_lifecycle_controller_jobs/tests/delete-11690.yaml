---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg:
      'Please define the following variables: idrac_ip,
      idrac_user and idrac_password.'
  when:
    idrac_ip is not defined or idrac_user is not defined or
    idrac_password is not defined

- block:
    - name: Creating first job
      ansible.builtin.include_tasks: _helper.yml

    - name: Creating second job
      ansible.builtin.include_tasks: _helper.yml

    - name: Delete LC Job.
      dellemc.openmanage.idrac_lifecycle_controller_jobs:
        job_id: "{{ export_job_id }}"
      register: delete_single_job

    - name: Get the URLs
      ansible.builtin.set_fact:
        url_1: "https://{{ idrac_ip }}:{{ idrac_port }}/redfish/v1/"
        url_2: "Managers/iDRAC.Embedded.1/Oem/Dell/Jobs"

    - name: Get job detail by uri.
      ansible.builtin.uri:
        url: "{{ url_1}}{{ url_2 }}"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        headers: 'Accept=application/json'
        force_basic_auth: true
      register: uri_single_job

    - name: Creating third job
      ansible.builtin.include_tasks: _helper.yml

    - name: Delete LC Job Queue.
      dellemc.openmanage.idrac_lifecycle_controller_jobs:
        validate_certs: false
      register: delete_all_jobs

    - name: Get all job details by uri.
      ansible.builtin.uri:
        url: "{{ url_1}}{{ url_2 }}"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        headers: 'Accept=application/json'
        force_basic_auth: true
      register: uri_all_jobs

    - name: verify status of tasks
      ansible.builtin.assert:
        that:
          - export_job_id not in (uri_single_job.json | string)
          - "uri_single_job.json['Members@odata.count'] != 0"
          - "uri_all_jobs.json['Members@odata.count'] == 0"

  module_defaults:
    dellemc.openmanage.idrac_lifecycle_controller_jobs:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
    dellemc.openmanage.idrac_server_config_profile:
      idrac_ip: "{{ idrac_ip }}"
      idrac_user: "{{ idrac_user }}"
      idrac_password: "{{ idrac_password }}"
      validate_certs: "{{ validate_certs }}"
