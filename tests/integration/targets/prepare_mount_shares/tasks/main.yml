- name: Collect only facts returned by facter
  ansible.builtin.setup:
    gather_subset:
      - facter
  run_once: true

- name: Setting home path and current user
  ansible.builtin.set_fact:
    home_path: "{{ lookup('env', 'HOME') }}"
    current_user: "{{ ansible_user_id }}"
  run_once: true

- name: Prepare NFS and CIFS shares
  run_once: true
  block:
    - name: Install NFS mount utility
      become: true
      ansible.builtin.dnf:
        name: nfs-utils
        state: present
        update_cache: true
      when: ansible_os_family == "RedHat"

    - name: Ensure NFS utilities are installed.
      become: true
      ansible.builtin.apt:
        name:
          - nfs-common
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Mount NFS share
      become: true
      ansible.posix.mount:
        fstype: nfs
        state: mounted
        src: "{{ nfs_share_name }}"
        path: "{{ home_path }}/nfs"
      register: nfs_mount

    - name: Mount CIFS share
      become: true
      ansible.posix.mount:
        fstype: cifs
        state: mounted
        src: "{{ cifs_share_name }}"
        path: "{{ home_path }}/cifs"
        opts:
          "username={{ cifs_share_user }},
           password={{ cifs_share_password }},
          file_mode=0777,dir_mode=0777,uid={{ current_user }},
          gid={{ current_user }},forcegid,forceuid"
      register: cifs_mount

    - name: Setting share mount
      ansible.builtin.set_fact:
        nfs_share_mnt: "{{ nfs_mount.name }}"
        cifs_share_mnt: "{{ cifs_mount.name }}"
