---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg:
      'Please define the following variables: idrac_ip,
      idrac_user and idrac_password.'
  when:
    idrac_ip is not defined or idrac_user is not defined
    or idrac_password is not defined

- block:
    - name: Negative - missing required argument
      dellemc.openmanage.idrac_diagnostics:
        validate_certs: false
      register: invalid_missing_argument
      ignore_errors: true

    - name: Verify task status - Negative - missing required argument
      ansible.builtin.assert:
        that:
          - invalid_missing_argument.failed
          - not invalid_missing_argument.changed
          - 'invalid_missing_argument.msg ==
            "one of the following is required: run, export"'

    - name: Negative - unsupported argument
      dellemc.openmanage.idrac_diagnostics:
        unsupported_argument: unsupported
        run: true
      register: invalid_unsupported_argument
      ignore_errors: true

    - name: setting fact for unsuppoerted argument message
      ansible.builtin.set_fact:
        msg_var:
          "Unsupported parameters for (dellemc.openmanage.idrac_diagnostics)
          module: unsupported_argument. Supported parameters include: ca_path,
          export, idrac_ip, idrac_password, idrac_port, idrac_user, job_wait,
          job_wait_timeout, reboot_type, resource_id, run, run_mode,
          scheduled_end_time, scheduled_start_time, share_parameters,
          timeout, validate_certs, x_auth_token (idrac_pwd)."

    - name: Verify task status - Negative - unsupported argument
      ansible.builtin.assert:
        that:
          - invalid_unsupported_argument.failed
          - not invalid_unsupported_argument.changed
          - msg_var == invalid_unsupported_argument.msg

    - name: Negative - unreachable host
      dellemc.openmanage.idrac_diagnostics:
        idrac_ip: 999.999.999.999
        run: true
      register: invalid_unreachable
      ignore_unreachable: true

    - name: Verify task status - Negative - unreachable host
      ansible.builtin.assert:
        that:
          - invalid_unreachable.unreachable
          - not invalid_unreachable.changed
          - 'invalid_unreachable.msg ==
            "<urlopen error Unable to resolve hostname or
            IP 999.999.999.999.>" or invalid_unreachable.msg ==
            "<urlopen error [Errno -2] Name or service not known>"'

    - name: Negative - invalid port
      dellemc.openmanage.idrac_diagnostics:
        idrac_ip: "{{ idrac_ip|ansible.utils.ipwrap }}:65536"
        run: true
      register: invalid_port
      ignore_unreachable: true

    - name: Verify task status - Negative - invalid port
      ansible.builtin.assert:
        that:
          - invalid_port.unreachable
          - not invalid_port.changed
          - ('invalid_port.msg == "<urlopen error [Errno 111]
            Connection refused>"') or
            ('invalid_port.msg == "<urlopen error timed out>"')

    - name: Negative - invalid username
      dellemc.openmanage.idrac_diagnostics:
        idrac_user: invalid
        run: true
      register: invalid_username
      ignore_errors: true

    - name: Verify task status - Negative - invalid username
      ansible.builtin.assert:
        that:
          - invalid_username.failed
          - not invalid_username.changed
          - 'invalid_username.msg ==
            "HTTP Error 401: Unauthorized" or invalid_username.msg ==
            "<urlopen error timed out>"'

    - name: Negative - invalid password
      dellemc.openmanage.idrac_diagnostics:
        idrac_password: invalid
        run: true
      register: invalid_password
      ignore_errors: true
      ignore_unreachable: true

    - name: Verify task status - Negative - invalid password
      ansible.builtin.assert:
        that:
          - not invalid_password.changed
          - 'invalid_password.msg == "HTTP Error 401: Unauthorized" or
            invalid_password.msg == "<urlopen error timed out>"'

    - name: Negative - invalid validate_certs
      dellemc.openmanage.idrac_diagnostics:
        validate_certs: invalid
        run: true
      register: invalid_validate_certs
      ignore_errors: true

    - ansible.builtin.set_fact:
        invalid_validate_certs_expected_msg:
          "argument 'validate_certs' is of type <class 'str'> and we
          were unable to convert to bool: The value 'invalid' is
          not a valid boolean.  Valid booleans include: "

    - name: Verify task status - Negative - invalid validate_certs
      ansible.builtin.assert:
        that:
          - invalid_validate_certs.failed
          - not invalid_validate_certs.changed
          - invalid_validate_certs_expected_msg in invalid_validate_certs.msg

    - name: Negative - invalid ca_path path
      dellemc.openmanage.idrac_diagnostics:
        ca_path: /invalid/path
        run: true
      register: invalid_ca_path
      ignore_errors: true

    - name: setting fact for unsuppoerted argument message
      ansible.builtin.set_fact:
        msg_var1: "[Errno 2] No such file or directory: b''/invalid/path''"
        msg_var2: "[Errno 2] No such file or directory"

    - name: Verify task status - Negative - invalid ca_path path
      ansible.builtin.assert:
        that:
          - invalid_ca_path.failed
          - not invalid_ca_path.changed
          - invalid_ca_path.msg == msg_var1 or invalid_ca_path.msg == msg_var2

    - name: Negative - invalid timeout type
      dellemc.openmanage.idrac_diagnostics:
        timeout: invalid
        run: true
      register: invalid_timeout_type
      ignore_errors: true

    - name: setting fact for unsuppoerted argument message
      ansible.builtin.set_fact:
        msg_var1: "argument 'timeout' is of type <class ''str''>
          and we were unable to convert to int: <class ''str''> cannot be
          converted to an int"
        msg_var2: "argument 'timeout' is of type <class 'str'>
          and we were unable to convert to int: \"'invalid'\"
          cannot be converted to an int"


    - name: Verify task status - Negative - invalid timeout type
      ansible.builtin.assert:
        that:
          - invalid_timeout_type.failed
          - not invalid_timeout_type.changed
          - invalid_timeout_type.msg == msg_var1 or
            invalid_timeout_type.msg == msg_var2

    - name: Negative - invalid timeout value
      dellemc.openmanage.idrac_diagnostics:
        timeout: -1
        run: true
      register: invalid_timeout_value
      ignore_errors: true

    - name: Verify task status - Negative - invalid timeout value
      ansible.builtin.assert:
        that:
          - invalid_timeout_value.failed
          - not invalid_timeout_value.changed
          - 'invalid_timeout_value.msg == "Timeout value out of range"'

    - name: Negative - invalid resource id
      dellemc.openmanage.idrac_diagnostics:
        resource_id: iDRAC.Embedded.2
        run: true
      register: invalid_resource_id
      ignore_errors: true

    - name: Verify task status - Negative - invalid resource id
      ansible.builtin.assert:
        that:
          - invalid_resource_id.failed
          - not invalid_resource_id.changed
          - 'invalid_resource_id.msg ==
            "Unable to complete the operation because the value
            `iDRAC.Embedded.2` for the input  `resource_id` parameter is
            invalid."'
