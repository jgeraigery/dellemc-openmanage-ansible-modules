---
- name: Prepare URLs
  ansible.builtin.set_fact:
    url1: "https://{{ idrac_ip | ansible.utils.ipwrap }}:{{ idrac_port }}"
    url2: "/redfish/v1/Managers/iDRAC.Embedded.1/Oem/Dell/Jobs/{{ job_id }}"

- name: Get data using uri
  ansible.builtin.uri:
    url: "{{ url1 }}{{ url2 }}"
    method: GET
    body: {}
    status_code: 200
  until: uri_res.status == 200
  retries: 12
  delay: 5
  register: uri_res

- name: Remove odata from uri response
  ansible.builtin.set_fact:
    job_data_uri:
      "{{ uri_res.json | ansible.utils.remove_keys(target=['@odata',
      'MessageArgs@odata.count'], matching_parameter='regex') }}"

- name: Set facts
  ansible.builtin.set_fact:
    uri_job_status: "{{ job_data_uri }}"
