---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg:
      'Please define the following variables: idrac_ip,
      idrac_user and idrac_password.'
  when:
    idrac_ip is not defined or idrac_user is not defined
    or idrac_password is not defined

- name:
    Export diagnostics to HTTP share all cases with http
    proxy with ignore_certificate_warning.
  ansible.builtin.include_tasks: _verify_export_http.yml
  vars:
    diag_http_share_ip: "{{ http_share }}"
    diag_http_share_dir_path: "{{ http_share_dir_path }}"
    diag_http_share_user: "{{ http_share_user | default(omit) }}"
    diag_http_share_password: "{{ http_share_password | default(omit) }}"
    diag_share_type: http
    diag_http_proxy_support: "parameters_proxy"
    diag_http_proxy_server: "{{ http_proxy_server }}"
    diag_http_proxy_port: "{{ http_proxy_port }}"
    diag_http_proxy_username: "{{ http_proxy_username | default(omit) }}"
    diag_http_proxy_password: "{{ http_proxy_password | default(omit) }}"
    diag_http_proxy_type: "http"
  when: http_proxy_enabled
