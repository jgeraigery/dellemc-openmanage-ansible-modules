---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg:
      'Please define the following variables: idrac_ip,
      idrac_user and idrac_password.'
  when:
    idrac_ip is not defined or idrac_user is not defined
    or idrac_password is not defined

- name: Export diagnostics to HTTP share all cases without proxy.
  ansible.builtin.include_tasks: _verify_export_http.yml
  vars:
    diag_http_share_ip: "{{ https_share_ip }}"
    diag_http_share_dir_path: "{{ https_share_dir_path }}"
    diag_http_share_user: "{{ https_share_username | default(omit) }}"
    diag_http_share_password: "{{ https_share_password | default(omit) }}"
    diag_share_type: https
    diag_http_proxy_support: "off"
