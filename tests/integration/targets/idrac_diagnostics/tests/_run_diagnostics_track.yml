---
- name: Prepare URLs
  ansible.builtin.set_fact:
    url1: "https://{{ idrac_ip | ansible.utils.ipwrap }}:{{ idrac_port }}"
    url2: "/redfish/v1/Managers/iDRAC.Embedded.1/Oem/Dell/DellLCService/"
    url3: "Actions/DellLCService.RunePSADiagnostics"
    url4: "Actions/DellLCService.ExportePSADiagnosticsResult"

- name: Run Diagnostics via uri
  ansible.builtin.uri:
    url: "{{ url1 }}{{ url2 }}{{ url3 }}"
    method: POST
    body:
      "RebootJobType": "{{ reboot_job_type | default('PowerCycle') }}"
      "RunMode": "{{ run_mode | default('Express') }}"
    status_code:
      - 200
      - 202
  register: run_api_result
  delegate_to: localhost

- name: Job tracking iDRAC
  ansible.builtin.uri:
    url: "{{ run_api_result.location }}"
    method: "GET"
    status_code: 200, 202
  register: result
  until: result.json.JobState in ['Completed', 'Failed']
  retries: "{{ retries_count | default(100) }}"
  delay: "{{ polling_interval | default(30) }}"
  delegate_to: localhost
  when: job_track == true

- name: Export Diagnostics local via uri
  ansible.builtin.uri:
    url: "{{ url1 }}{{ url2 }}{{ url4 }}"
    method: POST
    body:
      "ShareType": "Local"
    status_code:
      - 200
      - 202
  register: export_api_result
  delegate_to: localhost
  when: job_track == true
