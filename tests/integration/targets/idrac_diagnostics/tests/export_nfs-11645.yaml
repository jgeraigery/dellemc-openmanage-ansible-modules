---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg:
      'Please define the following variables: idrac_ip,
      idrac_user and idrac_password.'
  when:
    idrac_ip is not defined or idrac_user is not defined
    or idrac_password is not defined

- name: Prepare file name
  ansible.builtin.set_fact:
    path1: "{{ exported_diagnostics_local_path }}/{{ idrac_ip }}"
    path2: "_api_diagnostics.txt"

- name: NFS export validate
  vars:
    local_filename: "test_nfs_diagnostics.txt"
    api_exported_filename: "{{ path1 }}{{ path2 }}"
  block:
    - name: Delete file if existing
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_items:
        - "{{ nfs_share_mnt }}/{{ local_filename }}"
        - "{{ api_exported_filename }}"

    - name: Ensure the diagnostics is present
      ansible.builtin.include_tasks: _ensure_run.yml

    - name: Set the NFS IP and directory path
      ansible.builtin.set_fact:
        nfs_share_ip: "{{ nfs_share_name.split(':/')[0] }}"
        nfs_share_dir_path: "{{ nfs_share_name.split(':/')[1] }}"

    - name: CheckMode - Export diagnostics to nfs
      dellemc.openmanage.idrac_diagnostics:
        export: true
        run: false
        share_parameters:
          file_name: "{{ local_filename }}"
          ip_address: "{{ nfs_share_ip }}"
          share_name: "{{ nfs_share_dir_path }}"
          share_type: nfs
      register: nfs_export_check
      check_mode: true

    - name: CheckMode - Verify
      ansible.builtin.assert:
        that:
          - nfs_export_check.changed
          - nfs_export_check.msg == "Changes found to be applied."

    - name: Get current time
      ansible.builtin.set_fact:
        current_local_time: "{{ now() }}"

    - name: Export diagnostics to nfs without filename
      dellemc.openmanage.idrac_diagnostics:
        export: true
        run: false
        share_parameters:
          ip_address: "{{ nfs_share_ip }}"
          share_name: "{{ nfs_share_dir_path }}"
          share_type: nfs
      register: nfs_export_no_filename

    - name: Module - Verify diagnostics without fiename exported successfully
      ansible.builtin.assert:
        that:
          - nfs_export_no_filename.changed
          - nfs_export_no_filename.msg ==
            "Successfully exported the diagnostics."
          - "'diagnostics_file_path' in nfs_export_no_filename"
          - "{{ nfs_export_no_filename.diagnostics_file_path.startswith(
            (nfs_share_ip + ':/' + nfs_share_dir_path.strip('/') + '/'
            + (((idrac_ip | ansible.utils.ipv6form('expand')) if (idrac_ip
            | ansible.utils.ipv6) else idrac_ip).replace(':', '.')) )) }}"

    - name: Get time from file name
      ansible.builtin.set_fact:
        diagnostics_file_time:
          "{{ ((nfs_export_no_filename.diagnostics_file_path | basename
          | splitext | first | split('_'))[-2:] | join('')) | to_datetime(
          '%Y%m%d%H%M%S') }}"

    - name: Assert dynamic filename time
      ansible.builtin.assert:
        that:
          - current_local_time < diagnostics_file_time

    - name: Export diagnostics to nfs
      dellemc.openmanage.idrac_diagnostics:
        export: true
        run: false
        share_parameters:
          file_name: "{{ local_filename }}"
          ip_address: "{{ nfs_share_ip }}"
          share_name: "{{ nfs_share_dir_path }}"
          share_type: nfs
      register: nfs_export

    - name: Module - Verify diagnostics was exported successfully
      ansible.builtin.assert:
        that:
          - nfs_export.changed
          - nfs_export.msg == "Successfully exported the diagnostics."

    - name: Compare the local files
      ansible.builtin.include_tasks: _verify_diag_file.yml
      vars:
        api_file: "{{ api_exported_filename }}"
        module_file: "{{ nfs_share_mnt }}/{{ local_filename }}"

  always:
    - name: Delete files after use
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_items:
        - "{{ nfs_share_mnt }}/{{ local_filename }}"
        - "{{ api_exported_filename }}"
