---
- name: Test that we have an iDRAC host, iDRAC username and iDRAC password
  ansible.builtin.fail:
    msg:
      'Please define the following variables: idrac_ip,
      idrac_user and idrac_password.'
  when:
    idrac_ip is not defined or idrac_user is not defined
    or idrac_password is not defined

- block:
    - name:
        Run diagnostics with run_mode as extended, reboot_type as
        graceful and with job_wait as false (Check mode - Changes expected)
      dellemc.openmanage.idrac_diagnostics: &run_diagnostics
        run: true
        run_mode: extended
        reboot_type: graceful
        job_wait: false
      register: cm_result_diagnostics
      check_mode: true

    - name:
        Verify task status - Run diagnostics with run_mode as extended,
        reboot_type as graceful and with job_wait as false
        (Check mode - Changes expected)
      ansible.builtin.assert:
        that:
          - cm_result_diagnostics.changed
          - 'cm_result_diagnostics.msg == "Changes found to be applied."'

    - name:
        Run diagnostics with run_mode as extended, reboot_type as graceful
        and with job_wait as false (Normal mode)
      dellemc.openmanage.idrac_diagnostics:
        <<: *run_diagnostics
      register: result_diagnostics

    - name: Get job id
      ansible.builtin.include_tasks: _get_job_details.yml
      vars:
        job_id: "{{ result_diagnostics.job_details.Id }}"

    - name:
        Verify task status - Run diagnostics with run_mode as extended,
        reboot_type as graceful and with job_wait as false (Normal mode)
      ansible.builtin.assert:
        that:
          - result_diagnostics.changed
          - result_diagnostics.msg ==
            "Successfully triggered the job to run diagnostics."

    - name:
        Verify iDRAC job status - Run diagnostics with run_mode as extended,
        reboot_type as graceful and with job_wait as false (Normal mode)
      ansible.builtin.assert:
        that:
          - uri_job_status.JobState == "Scheduled" or "Running"
          - uri_job_status.JobType == "RemoteDiagnostics"

    - name: Track the job
      ansible.builtin.include_role: name=prepare_lifecycle_controller_job
      vars:
        job_id: "{{ result_diagnostics.job_details.Id }}"
      when:
        result_diagnostics.msg == "Successfully triggered the
        job to run diagnostics."

    - name: Pause for 2 minutes
      ansible.builtin.pause:
        minutes: 2

    - name: Get job details
      ansible.builtin.include_tasks: _get_job_details.yml
      vars:
        job_id: "{{ result_diagnostics.job_details.Id }}"

    - name:
        "Verify iDRAC job status post job completion - Run diagnostics with
        run_mode as extended, reboot_type as graceful and with job_wait
        as false (Normal mode)"
      ansible.builtin.assert:
        that:
          - uri_job_status.JobState == "Completed"
          - uri_job_status.JobType == "RemoteDiagnostics"
